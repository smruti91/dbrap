services:
  mysqldb:
    image: mysql:8.0
    container_name: mysqldb
    restart: always

    ports:
      - "8012:3306"   # ✅ host:container

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dbrap
      MYSQL_USER: user
      MYSQL_PASSWORD: dbrap

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: