<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>403 — Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist Mono', monospace;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        .box { text-align: center; animation: fadeUp 0.4s ease both; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .code {
            font-family: 'Instrument Serif', serif;
            font-size: 5rem;
            color: #f85149;
            line-height: 1;
            margin-bottom: 16px;
        }

        h1 { font-size: 1rem; font-weight: 400; margin-bottom: 8px; }
        p  { font-size: 0.72rem; color: #7d8590; margin-bottom: 28px; }

        a {
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #7d8590;
            text-decoration: none;
            border: 1px solid #21262d;
            padding: 8px 18px;
            border-radius: 4px;
            transition: color 0.15s, border-color 0.15s;
        }

        a:hover { color: #e2e8f0; border-color: #7d8590; }
    </style>
</head>
<body>
    <div class="box">
        <div class="code">403</div>
        <h1>Access Denied</h1>
        <p>You don't have permission to view this page.</p>
        <a href="/dbrap/login.html">← Back to Login</a>
    </div>
</body>
</html>
